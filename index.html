<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Survival V2</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background-color: #111;
            border: 50px solid #444; 
            box-sizing: border-box;
            height: 100vh;
            width: 100vw;
            max-width: 1000px;
            max-height: 800px;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #top-ui-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
        }

        #top-right {
            position: absolute;
            top: 15px;
            right: 20px;
            pointer-events: auto;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            border: 2px solid #555;
        }

        #wave-info {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }

        #next-wave-btn {
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            visibility: hidden; /* Bruker visibility for å ikke dytte på layouten */
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            box-shadow: 0 4px #2e6631;
        }
        
        #next-wave-btn:active {
            box-shadow: 0 2px #2e6631;
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="wave-info">Wave: <span id="wave-number">1</span></div>
        
        <div id="top-ui-container">
            <button id="next-wave-btn">Start Next Wave (<span id="timer">5</span>)</button>
        </div>

        <div id="top-right">
            <label>
                <input type="checkbox" id="auto-start"> Auto Start Wave
            </label>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = canvas.clientWidth - 100;
            canvas.height = canvas.clientHeight - 100;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 20,
            speed: 2, // Halvert fart (var 4)
            color: "cyan"
        };

        const bullets = [];
        const slimes = [];
        const keys = {};
        
        // Cooldown variabler
        let lastShotTime = 0;
        const shootCooldown = 500; // 0.5 sekunder i millisekunder

        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        window.addEventListener("keydown", (e) => {
            if (e.key.toLowerCase() === "e") {
                const currentTime = Date.now();
                // Sjekk om det har gått nok tid siden forrige skudd
                if (currentTime - lastShotTime >= shootCooldown && gameState === "playing") {
                    shootAutoAim();
                    lastShotTime = currentTime;
                }
            }
        });

        function shootAutoAim() {
            if (slimes.length === 0) return;

            let nearestSlime = null;
            let minDistance = Infinity;

            for (let s of slimes) {
                let dist = Math.hypot(s.x - player.x, s.y - player.y);
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestSlime = s;
                }
            }

            if (nearestSlime) {
                const angle = Math.atan2(nearestSlime.y - player.y, nearestSlime.x - player.x);
                bullets.push({
                    x: player.x,
                    y: player.y,
                    dx: Math.cos(angle) * 10,
                    dy: Math.sin(angle) * 10,
                    size: 5,
                    color: "yellow",
                    damage: 1
                });
            }
        }

        let wave = 1;
        let gameState = "playing"; 
        let slimesToSpawn = 3;
        let timeToNextWave = 5;
        let waitInterval;

        const waveElement = document.getElementById("wave-number");
        const autoStartCheckbox = document.getElementById("auto-start");
        const nextWaveBtn = document.getElementById("next-wave-btn");
        const timerElement = document.getElementById("timer");

        function getSlimeCountForWave(w) {
            if (w === 1) return 3;
            if (w === 2) return 5;
            if (w === 3) return 8;
            let count = 8;
            for (let i = 4; i <= w; i++) {
                count += (2 + i);
            }
            return count;
        }

        function spawnSlimes(count) {
            for (let i = 0; i < count; i++) {
                let x, y;
                if (Math.random() < 0.5) {
                    x = Math.random() < 0.5 ? -20 : canvas.width + 20;
                    y = Math.random() * canvas.height;
                } else {
                    x = Math.random() * canvas.width;
                    y = Math.random() < 0.5 ? -20 : canvas.height + 20;
                }

                slimes.push({
                    x: x,
                    y: y,
                    size: 15,
                    speed: Math.random() * 0.3 + 0.4, // Enda litt treigere for balanse
                    hp: 2,
                    color: "lime"
                });
            }
        }

        spawnSlimes(slimesToSpawn);

        function startWavePause() {
            gameState = "waiting";
            timeToNextWave = 5;
            nextWaveBtn.style.visibility = "visible";
            timerElement.innerText = timeToNextWave;

            waitInterval = setInterval(() => {
                timeToNextWave--;
                timerElement.innerText = timeToNextWave;
                
                if (timeToNextWave <= 0) {
                    if (autoStartCheckbox.checked) {
                        startNextWave();
                    } else {
                        clearInterval(waitInterval);
                        timerElement.innerText = "Klar!";
                    }
                }
            }, 1000);
        }

        function startNextWave() {
            clearInterval(waitInterval);
            nextWaveBtn.style.visibility = "hidden";
            wave++;
            waveElement.innerText = wave;
            slimesToSpawn = getSlimeCountForWave(wave);
            spawnSlimes(slimesToSpawn);
            gameState = "playing";
        }

        nextWaveBtn.addEventListener("click", startNextWave);

        function update() {
            // BEVEGELSE (Ligger utenfor gameState-sjekken så du kan bevege deg i pauser)
            if ((keys["w"] || keys["arrowup"]) && player.y - player.size/2 > 0) player.y -= player.speed;
            if ((keys["s"] || keys["arrowdown"]) && player.y + player.size/2 < canvas.height) player.y += player.speed;
            if ((keys["a"] || keys["arrowleft"]) && player.x - player.size/2 > 0) player.x -= player.speed;
            if ((keys["d"] || keys["arrowright"]) && player.x + player.size/2 < canvas.width) player.x += player.speed;

            if (gameState === "playing") {
                // Oppdater Kuler
                for (let i = bullets.length - 1; i >= 0; i--) {
                    bullets[i].x += bullets[i].dx;
                    bullets[i].y += bullets[i].dy;
                    if (bullets[i].x < 0 || bullets[i].x > canvas.width || bullets[i].y < 0 || bullets[i].y > canvas.height) {
                        bullets.splice(i, 1);
                    }
                }

                // Oppdater Slimes
                for (let i = slimes.length - 1; i >= 0; i--) {
                    let s = slimes[i];
                    let angle = Math.atan2(player.y - s.y, player.x - s.x);
                    s.x += Math.cos(angle) * s.speed;
                    s.y += Math.sin(angle) * s.speed;

                    for (let j = bullets.length - 1; j >= 0; j--) {
                        let b = bullets[j];
                        let dist = Math.hypot(b.x - s.x, b.y - s.y);
                        if (dist < s.size/2 + b.size) {
                            s.hp -= b.damage;
                            bullets.splice(j, 1);
                            if (s.hp <= 0) {
                                slimes.splice(i, 1);
                                break;
                            }
                        }
                    }
                }

                if (slimes.length === 0 && slimesToSpawn > 0) {
                    startWavePause();
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Spiller
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);

            // Slimes
            ctx.fillStyle = "lime";
            slimes.forEach(s => {
                ctx.fillRect(s.x - s.size/2, s.y - s.size/2, s.size, s.size);
            });

            // Kuler
            ctx.fillStyle = "yellow";
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
