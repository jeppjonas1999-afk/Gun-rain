<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Survival V4 - V-Frames & Cooldowns</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background-color: #111;
            border: 50px solid #444; 
            box-sizing: border-box;
            height: 100vh;
            width: 100vw;
            max-width: 1000px;
            max-height: 800px;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #top-ui-container {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
            border: 2px solid #555;
        }

        #health-bar-container {
            width: 200px;
            height: 20px;
            background-color: #555;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        #health-bar-fill {
            height: 100%;
            width: 100%;
            background-color: #ff3333;
            transition: width 0.2s;
        }

        #wave-info {
            position: absolute;
            top: 15px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }

        #top-right {
            position: absolute;
            top: 15px;
            right: 20px;
            pointer-events: auto;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            border: 2px solid #555;
        }

        #next-wave-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            visibility: hidden; 
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        
        #next-wave-btn:hover { background-color: #45a049; }
        
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            color: red;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border: 4px solid red;
            text-align: center;
            border-radius: 10px;
            pointer-events: auto;
        }
        #game-over button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="wave-info">Wave: <span id="wave-number">1</span></div>
        
        <div id="top-ui-container">
            <div style="font-weight: bold; margin-bottom: 5px;">HP: <span id="hp-text">15</span>/15</div>
            <div id="health-bar-container">
                <div id="health-bar-fill"></div>
            </div>
            <button id="next-wave-btn">Start Next Wave (<span id="timer">5</span>)</button>
        </div>

        <div id="top-right">
            <label><input type="checkbox" id="auto-start"> Auto Start</label>
        </div>
        
        <div id="game-over">
            DU DØDE!<br>
            <button onclick="location.reload()">Prøv igjen</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = canvas.clientWidth - 100;
            canvas.height = canvas.clientHeight - 100;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            size: 20,
            speed: 2,
            color: "cyan",
            hp: 15,
            maxHp: 15,
            lastHitTime: 0,
            iFrames: 500 // 0.5 sekunder
        };

        const bullets = [];
        let slimes = [];
        const keys = {};
        
        let lastShotTime = 0;
        const shootCooldown = 500; 

        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        window.addEventListener("keydown", (e) => {
            if (e.key.toLowerCase() === "e") {
                const currentTime = Date.now();
                if (currentTime - lastShotTime >= shootCooldown && gameState === "playing") {
                    shootAutoAim();
                    lastShotTime = currentTime;
                }
            }
        });

        function shootAutoAim() {
            if (slimes.length === 0) return;
            let nearestSlime = null;
            let minDistance = Infinity;

            for (let s of slimes) {
                let dist = Math.hypot(s.x - player.x, s.y - player.y);
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestSlime = s;
                }
            }

            if (nearestSlime) {
                const angle = Math.atan2(nearestSlime.y - player.y, nearestSlime.x - player.x);
                bullets.push({
                    x: player.x, y: player.y,
                    dx: Math.cos(angle) * 10,
                    dy: Math.sin(angle) * 10,
                    size: 5, color: "yellow", damage: 1
                });
            }
        }

        // --- SLIME LOGIKK (Stages, Stats, Splitting, Timers) ---
        function getSlimeStats(stage) {
            const colors = {1: "lime", 2: "red", 3: "purple", 4: "yellow"};
            return {
                stage: stage,
                hp: 1 + stage,
                maxHp: 1 + stage,
                damage: stage,
                size: 15 * Math.pow(1.5, stage - 1),
                color: colors[stage] || "white",
                speed: Math.random() * 0.3 + 0.4,
                lastMergeCheck: Date.now(),
                canFuseTime: 0, // Tiden de må vente før de kan fuse (10 sekunder for splittede slimes)
                vulnerableUntil: 0 // Tiden de insta-dør av 1 skudd (1 sek for fuse, 0.3 for split)
            };
        }

        function createSlime(x, y, stage) {
            let stats = getSlimeStats(stage);
            return { x: x, y: y, ...stats };
        }

        let wave = 1;
        let gameState = "playing"; // "playing", "waiting", "gameover"
        let slimesToSpawn = 3;
        let timeToNextWave = 5;
        let waitInterval;

        function updateUI() {
            document.getElementById("hp-text").innerText = player.hp;
            const hpPercent = (player.hp / player.maxHp) * 100;
            document.getElementById("health-bar-fill").style.width = hpPercent + "%";
        }

        function spawnSlimes(count) {
            let upgradeChance = Math.min(wave * 0.05, 0.4); 

            for (let i = 0; i < count; i++) {
                let x = Math.random() < 0.5 ? -30 : canvas.width + 30;
                let y = Math.random() * canvas.height;
                
                let startStage = 1;
                if (Math.random() < upgradeChance) startStage = 2;
                
                slimes.push(createSlime(x, y, startStage));
            }
        }

        spawnSlimes(slimesToSpawn);

        function startWavePause() {
            if (gameState === "gameover") return;
            gameState = "waiting";
            timeToNextWave = 5;
            document.getElementById("next-wave-btn").style.visibility = "visible";
            document.getElementById("timer").innerText = timeToNextWave;

            waitInterval = setInterval(() => {
                timeToNextWave--;
                document.getElementById("timer").innerText = timeToNextWave;
                
                if (timeToNextWave <= 0) {
                    if (document.getElementById("auto-start").checked) {
                        startNextWave();
                    } else {
                        clearInterval(waitInterval);
                        document.getElementById("timer").innerText = "Klar!";
                    }
                }
            }, 1000);
        }

        function startNextWave() {
            clearInterval(waitInterval);
            document.getElementById("next-wave-btn").style.visibility = "hidden";
            wave++;
            document.getElementById("wave-number").innerText = wave;
            
            let count = 3;
            if (wave === 2) count = 5;
            else if (wave === 3) count = 8;
            else if (wave >= 4) {
                count = 8;
                for (let i = 4; i <= wave; i++) count += (2 + i);
            }
            
            slimesToSpawn = count;
            spawnSlimes(slimesToSpawn);
            gameState = "playing";
        }

        document.getElementById("next-wave-btn").addEventListener("click", startNextWave);

        function update() {
            if (gameState === "gameover") return;

            // Spillerbevegelse
            if ((keys["w"] || keys["arrowup"]) && player.y - player.size/2 > 0) player.y -= player.speed;
            if ((keys["s"] || keys["arrowdown"]) && player.y + player.size/2 < canvas.height) player.y += player.speed;
            if ((keys["a"] || keys["arrowleft"]) && player.x - player.size/2 > 0) player.x -= player.speed;
            if ((keys["d"] || keys["arrowright"]) && player.x + player.size/2 < canvas.width) player.x += player.speed;

            if (gameState === "playing") {
                const now = Date.now();
                let newlySpawnedSlimes = []; 

                // Oppdater Kuler
                for (let i = bullets.length - 1; i >= 0; i--) {
                    bullets[i].x += bullets[i].dx;
                    bullets[i].y += bullets[i].dy;
                    if (bullets[i].x < 0 || bullets[i].x > canvas.width || bullets[i].y < 0 || bullets[i].y > canvas.height) {
                        bullets.splice(i, 1);
                    }
                }

                // Oppdater Slimes
                for (let i = slimes.length - 1; i >= 0; i--) {
                    let s = slimes[i];
                    if (s.dead) continue;

                    // Bevegelse mot spiller
                    let angle = Math.atan2(player.y - s.y, player.x - s.x);
                    s.x += Math.cos(angle) * s.speed;
                    s.y += Math.sin(angle) * s.speed;

                    // 1. Skade på spiller
                    let distToPlayer = Math.hypot(player.x - s.x, player.y - s.y);
                    if (distToPlayer < s.size/2 + player.size/2) {
                        if (now - player.lastHitTime >= player.iFrames) {
                            player.hp -= s.damage;
                            player.lastHitTime = now;
                            updateUI();
                            if (player.hp <= 0) {
                                gameState = "gameover";
                                document.getElementById("game-over").style.display = "block";
                                return;
                            }
                        }
                    }

                    // 2. Kollisjon med kuler
                    for (let j = bullets.length - 1; j >= 0; j--) {
                        let b = bullets[j];
                        let distToBullet = Math.hypot(b.x - s.x, b.y - s.y);
                        if (distToBullet < s.size/2 + b.size) {
                            bullets.splice(j, 1); // Fjern kulen
                            
                            // Sjekk Vulnerability Frames (Insta-kill)
                            if (now < s.vulnerableUntil) {
                                s.hp = 0; 
                            } else {
                                s.hp -= b.damage;
                            }
                            
                            if (s.hp <= 0) {
                                s.dead = true;
                                // Splitte-logikk!
                                if (s.stage > 1) {
                                    let s1 = createSlime(s.x - 10, s.y, s.stage - 1);
                                    let s2 = createSlime(s.x + 10, s.y, s.stage - 1);
                                    
                                    // Legg til 10 sekunders fuse cooldown og 0.3 sek V-frames
                                    s1.canFuseTime = now + 10000;
                                    s2.canFuseTime = now + 10000;
                                    s1.vulnerableUntil = now + 300;
                                    s2.vulnerableUntil = now + 300;

                                    newlySpawnedSlimes.push(s1, s2);
                                }
                                break; 
                            }
                        }
                    }

                    // 3. FUSING (Sjekke mot andre slimes, pluss sjekke cooldown)
                    if (!s.dead && s.stage < 4 && now > s.canFuseTime) {
                        for (let k = i - 1; k >= 0; k--) { 
                            let otherS = slimes[k];
                            // Kan kun fuse hvis ingen har cooldown
                            if (otherS.dead || otherS.stage !== s.stage || now < otherS.canFuseTime) continue;

                            let distSlimes = Math.hypot(otherS.x - s.x, otherS.y - s.y);
                            if (distSlimes < (s.size/2 + otherS.size/2)) { 
                                if (now - s.lastMergeCheck >= 250 && now - otherS.lastMergeCheck >= 250) {
                                    s.lastMergeCheck = now;
                                    otherS.lastMergeCheck = now;
                                    
                                    if (Math.random() < 0.50) { 
                                        s.dead = true;
                                        otherS.dead = true;
                                        let fusedSlime = createSlime(s.x, s.y, s.stage + 1);
                                        // Legg til 1 sekund V-frames på den fusjonerte slimen
                                        fusedSlime.vulnerableUntil = now + 1000; 
                                        
                                        newlySpawnedSlimes.push(fusedSlime);
                                        break; 
                                    }
                                }
                            }
                        }
                    }
                }

                slimes = slimes.filter(s => !s.dead);
                slimes.push(...newlySpawnedSlimes);

                if (slimes.length === 0 && slimesToSpawn > 0) {
                    startWavePause();
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const now = Date.now();

            // Tegn Spiller (Blinke-effekt under i-frames)
            if (now - player.lastHitTime < player.iFrames) {
                if (Math.floor(now / 100) % 2 === 0) {
                    ctx.fillStyle = player.color;
                    ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
                }
            } else {
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
            }

            // Tegn Slimes
            slimes.forEach(s => {
                // Blinke hvit hvis de har V-frames (sårbare)
                if (now < s.vulnerableUntil) {
                    ctx.fillStyle = (Math.floor(now / 100) % 2 === 0) ? "white" : s.color;
                } else {
                    ctx.fillStyle = s.color;
                }
                ctx.fillRect(s.x - s.size/2, s.y - s.size/2, s.size, s.size);
                
                // HP-bar over slime hvis den har tatt skade (vises ikke på v-frames siden de er insta-kill da)
                if (s.hp < s.maxHp && now > s.vulnerableUntil) {
                    ctx.fillStyle = "red";
                    ctx.fillRect(s.x - s.size/2, s.y - s.size/2 - 8, s.size, 4);
                    ctx.fillStyle = "green";
                    ctx.fillRect(s.x - s.size/2, s.y - s.size/2 - 8, s.size * (s.hp/s.maxHp), 4);
                }
            });

            // Tegn Kuler
            ctx.fillStyle = "yellow";
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        updateUI(); 
        gameLoop();
    </script>
</body>
</html>
