<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Survival V7 - Animations & SMG</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            color: white;
            font-family: Arial, sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background-color: #111;
            border: 50px solid #444; 
            box-sizing: border-box;
            height: 100vh;
            width: 100vw;
            max-width: 1000px;
            max-height: 800px;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #item-hud-container {
            position: absolute;
            top: 5px; 
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #aaa;
        }
        
        #item-box {
            width: 40px;
            height: 40px;
            border: 3px solid white;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            color: white;
            text-align: center;
            line-height: 1.1;
        }
        
        .arrow { color: white; }

        #top-ui-container {
            margin-top: 60px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            pointer-events: auto;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 5px;
            border: 2px solid #555;
        }

        #health-bar-container {
            width: 200px;
            height: 20px;
            background-color: #555;
            border: 2px solid #fff;
            border-radius: 10px;
            overflow: hidden;
        }

        #health-bar-fill {
            height: 100%;
            width: 100%;
            background-color: #ff3333;
            transition: width 0.2s;
        }

        #wave-info {
            position: absolute;
            top: 60px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
        }

        #top-right {
            position: absolute;
            top: 60px;
            right: 20px;
            pointer-events: auto;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            border: 2px solid #555;
        }

        #next-wave-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            visibility: hidden; 
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        
        #merchant-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.95);
            padding: 40px;
            border: 4px solid #8a789c; /* Lilla-grå ramme */
            border-radius: 10px;
            pointer-events: auto;
            text-align: center;
            z-index: 100;
        }

        #deck {
            width: 150px;
            height: 220px;
            background: linear-gradient(135deg, #444, #222);
            border: 5px solid #888;
            border-radius: 10px;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            transition: transform 0.2s;
        }
        
        #deck:hover {
            transform: scale(1.05);
            border-color: gold;
        }

        #drawn-card-info {
            min-height: 60px;
            margin-top: 15px;
            font-size: 18px;
            color: white;
        }

        #close-merchant {
            margin-top: 20px;
            padding: 10px 20px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="item-hud-container">
            <span class="arrow">&lt;</span>
            <div id="item-box">Tom</div>
            <span class="arrow">&gt;</span>
        </div>

        <div id="wave-info">Wave: <span id="wave-number">1</span></div>
        
        <div id="top-ui-container">
            <div style="font-weight: bold; margin-bottom: 5px;">HP: <span id="hp-text">15</span>/15</div>
            <div id="health-bar-container">
                <div id="health-bar-fill"></div>
            </div>
            <button id="next-wave-btn">Start Next Wave (<span id="timer">5</span>)</button>
        </div>

        <div id="top-right">
            <label><input type="checkbox" id="auto-start"> Auto Start</label>
        </div>
        
        <div id="merchant-modal">
            <h2>The Merchant</h2>
            <p>Trekk ett kort!</p>
            <div id="deck">? Trekk ?</div>
            <div id="drawn-card-info"></div>
            <button id="close-merchant">Lukk</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = canvas.clientWidth - 100;
            canvas.height = canvas.clientHeight - 100;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- SPILLER & INVENTORY ---
        const player = {
            x: canvas.width / 2, y: canvas.height / 2,
            size: 20, speed: 2, color: "cyan",
            hp: 15, maxHp: 15, lastHitTime: 0, iFrames: 500,
            weapons: ["pistol"], 
            fireRateMult: 1.0 
        };

        const weaponCooldowns = {
            pistol: { lastShot: 0, baseDelay: 500 },
            shotgun: { lastShot: 0, baseDelay: 1000 },
            smg: { lastShot: 0, baseDelay: 100 } // NY: SMG delay på 0.1s
        };

        const inventory = []; 
        let selectedItemIndex = 0;

        const bullets = [];
        const landmines = []; 
        let slimes = [];
        let clouds = []; 
        const keys = {};
        
        // --- MERCHANT VARIABLER ---
        const merchant = {
            active: false,
            x: -100,
            y: canvas.height / 3 - 50, 
            width: 70, 
            height: 40, 
            color: "#8a789c", 
            state: "hidden", 
            hasDrawn: false
        };

        window.addEventListener("keydown", (e) => {
            keys[e.key.toLowerCase()] = true;
            
            if (e.key.toLowerCase() === "f") {
                if (merchant.state === "waiting" && !merchant.hasDrawn) {
                    let dist = Math.hypot(player.x - merchant.x, player.y - merchant.y);
                    if (dist < 80) {
                        document.getElementById("merchant-modal").style.display = "block";
                    }
                }
            }
            
            if (e.key.toLowerCase() === "c") useActiveItem();

            if (e.key === "ArrowLeft") cycleItem(-1);
            if (e.key === "ArrowRight") cycleItem(1);

            if (e.key.toLowerCase() === "e" && gameState === "playing") {
                const currentTime = Date.now();
                player.weapons.forEach(wpn => {
                    let stats = weaponCooldowns[wpn];
                    let finalCooldown = stats.baseDelay * player.fireRateMult;
                    
                    if (currentTime - stats.lastShot >= finalCooldown) {
                        shootWeapon(wpn);
                        stats.lastShot = currentTime;
                    }
                });
            }
        });

        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        // --- INVENTORY LOGIKK ---
        function cycleItem(dir) {
            if (inventory.length === 0) return;
            selectedItemIndex += dir;
            if (selectedItemIndex < 0) selectedItemIndex = inventory.length - 1;
            if (selectedItemIndex >= inventory.length) selectedItemIndex = 0;
            updateItemUI();
        }

        function updateItemUI() {
            const box = document.getElementById("item-box");
            if (inventory.length === 0) {
                box.innerText = "Tom";
            } else {
                let item = inventory[selectedItemIndex];
                if (item.id === "bullet_rain") box.innerHTML = "Bullet<br>Rain<br>x" + item.count;
                if (item.id === "landmine") box.innerHTML = "Mine<br>x" + item.count;
            }
        }

        function useActiveItem() {
            if (inventory.length === 0) return;
            let item = inventory[selectedItemIndex];
            
            if (item.id === "bullet_rain") {
                activateBulletRain();
                item.count--;
            } else if (item.id === "landmine") {
                landmines.push({ x: player.x, y: player.y, radius: 15, damage: 8 });
                item.count--;
            }

            if (item.count <= 0) {
                inventory.splice(selectedItemIndex, 1);
                if (selectedItemIndex >= inventory.length) selectedItemIndex = Math.max(0, inventory.length - 1);
            }
            updateItemUI();
        }

        function giveItem(id, amount) {
            let existing = inventory.find(i => i.id === id);
            if (existing) {
                existing.count += amount;
            } else {
                inventory.push({ id: id, count: amount });
            }
            updateItemUI();
        }

        // --- KORT & RARITY SYSTEM ---
        const rarities = { "Common": 35, "Rare": 25, "Epic": 20, "Mythic": 10, "Legendary": 8, "Exotic": 2 };
        const rarityColors = { "Common": "#aaaaaa", "Rare": "#00aaff", "Epic": "#aa00ff", "Mythic": "#ff0055", "Legendary": "#ffaa00", "Exotic": "#00ffcc" };

        const cards = [
            { id: "rapid_fire", name: "Rapid Fire", type: "upgrade", rarity: "Common", desc: "Reload 15% raskere." },
            { id: "shotgun", name: "Shotgun", type: "weapon", rarity: "Rare", desc: "Legger til en hagle til arsenalet ditt." },
            { id: "smg", name: "SMG", type: "weapon", rarity: "Epic", desc: "Skyter lynraskt (0.1s), men gjør bare 0.25 skade per skudd." }, // NYTT KORT
            { id: "bullet_rain", name: "Bullet Rain", type: "item", rarity: "Epic", desc: "Regner kuler over alle fiender i 2 sek." },
            { id: "landmine", name: "Landmine (x5)", type: "item", rarity: "Mythic", desc: "Plasser en mine som gjør 8 piercing damage i en sirkel." }
        ];

        document.getElementById("deck").addEventListener("click", () => {
            if (merchant.hasDrawn) return;
            merchant.hasDrawn = true;
            
            let roll = Math.random() * 100;
            let currentTarget = 0;
            let selectedRarity = "Common";
            
            for (let r in rarities) {
                currentTarget += rarities[r];
                if (roll <= currentTarget) {
                    selectedRarity = r;
                    break;
                }
            }

            let availableCards = cards.filter(c => c.rarity === selectedRarity);
            if (availableCards.length === 0) availableCards = cards.filter(c => c.rarity === "Common");

            let randomCard = availableCards[Math.floor(Math.random() * availableCards.length)];
            
            let color = rarityColors[randomCard.rarity];
            let infoDiv = document.getElementById("drawn-card-info");
            infoDiv.innerHTML = `Du fikk: <strong style="color:${color}">${randomCard.name}</strong> (${randomCard.rarity})<br><span style="font-size:14px; color:#ccc;">${randomCard.desc}</span>`;
            
            if (randomCard.id === "shotgun" && !player.weapons.includes("shotgun")) player.weapons.push("shotgun");
            if (randomCard.id === "smg" && !player.weapons.includes("smg")) player.weapons.push("smg");
            if (randomCard.id === "rapid_fire") player.fireRateMult *= 0.85;
            if (randomCard.id === "bullet_rain") giveItem("bullet_rain", 1);
            if (randomCard.id === "landmine") giveItem("landmine", 5);

            document.getElementById("deck").style.pointerEvents = "none";
            document.getElementById("deck").innerText = "Tomt";
            document.getElementById("close-merchant").style.display = "inline-block";
        });

        document.getElementById("close-merchant").addEventListener("click", () => {
            document.getElementById("merchant-modal").style.display = "none";
            document.getElementById("deck").style.pointerEvents = "auto";
            document.getElementById("deck").innerText = "? Trekk ?";
            document.getElementById("drawn-card-info").innerHTML = "";
            document.getElementById("close-merchant").style.display = "none";
        });

        // --- VÅPEN LOGIKK ---
        function shootWeapon(weaponType) {
            if (slimes.length === 0) return;
            let nearestSlime = null;
            let minDistance = Infinity;

            for (let s of slimes) {
                let dist = Math.hypot(s.x - player.x, s.y - player.y);
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestSlime = s;
                }
            }

            if (nearestSlime) {
                const baseAngle = Math.atan2(nearestSlime.y - player.y, nearestSlime.x - player.x);
                
                if (weaponType === "shotgun") {
                    let spreadAngles = [-0.39, -0.19, 0, 0.19, 0.39]; 
                    for (let offset of spreadAngles) {
                        bullets.push({
                            x: player.x, y: player.y, dx: Math.cos(baseAngle + offset) * 10, dy: Math.sin(baseAngle + offset) * 10,
                            size: 4, color: "orange", damage: 1
                        });
                    }
                } else if (weaponType === "pistol") {
                    bullets.push({
                        x: player.x, y: player.y, dx: Math.cos(baseAngle) * 10, dy: Math.sin(baseAngle) * 10,
                        size: 5, color: "yellow", damage: 1
                    });
                } else if (weaponType === "smg") {
                    // SMG: Raskere kuler, liten skade, litt hvit/grå farge
                    bullets.push({
                        x: player.x, y: player.y, dx: Math.cos(baseAngle) * 12, dy: Math.sin(baseAngle) * 12,
                        size: 3, color: "white", damage: 0.25
                    });
                }
            }
        }

        function activateBulletRain() {
            let now = Date.now();
            for (let s of slimes) clouds.push({ x: s.x, y: s.y, endTime: now + 2000, lastTick: now, size: 40 });
        }

        // --- SLIME LOGIKK (Farger & RGB for animasjon) ---
        const stageColors = {
            1: {r: 0, g: 255, b: 0},     // lime
            2: {r: 255, g: 0, b: 0},     // red
            3: {r: 128, g: 0, b: 128},   // purple
            4: {r: 255, g: 255, b: 0}    // yellow
        };

        function getSlimeStats(stage) {
            let col = stageColors[stage] || {r: 255, g: 255, b: 255};
            let colorString = `rgb(${col.r}, ${col.g}, ${col.b})`;
            return {
                stage: stage, hp: 1 + stage, maxHp: 1 + stage, damage: stage,
                size: 15 * Math.pow(1.5, stage - 1),
                color: colorString, rgb: col, speed: Math.random() * 0.3 + 0.4,
                lastMergeCheck: Date.now(), canFuseTime: 0, vulnerableUntil: 0,
                isFusing: false // Ny for animasjon
            };
        }
        function createSlime(x, y, stage) { return { x: x, y: y, ...getSlimeStats(stage) }; }

        let wave = 1;
        let gameState = "playing"; 
        let slimesToSpawn = 3;
        let timeToNextWave = 5;
        let waitInterval;

        function spawnSlimes(count) {
            let upgradeChance = Math.min(wave * 0.05, 0.4); 
            for (let i = 0; i < count; i++) {
                let x = Math.random() < 0.5 ? -30 : canvas.width + 30;
                let y = Math.random() * canvas.height;
                let startStage = (Math.random() < upgradeChance) ? 2 : 1;
                slimes.push(createSlime(x, y, startStage));
            }
        }
        spawnSlimes(slimesToSpawn);

        function startWavePause() {
            gameState = "waiting";
            timeToNextWave = 5;
            document.getElementById("next-wave-btn").style.visibility = "visible";
            document.getElementById("timer").innerText = timeToNextWave;
            
            // Merchant spawner NÅ HVER RUNDE
            merchant.active = true; 
            merchant.state = "walking_in";
            merchant.x = -100; 
            merchant.hasDrawn = false;

            waitInterval = setInterval(() => {
                timeToNextWave--;
                document.getElementById("timer").innerText = timeToNextWave;
                if (timeToNextWave <= 0) {
                    if (document.getElementById("auto-start").checked) startNextWave();
                    else { clearInterval(waitInterval); document.getElementById("timer").innerText = "Klar!"; }
                }
            }, 1000);
        }

        function startNextWave() {
            clearInterval(waitInterval);
            document.getElementById("next-wave-btn").style.visibility = "hidden";
            
            if (merchant.active && merchant.state === "waiting") {
                merchant.state = "walking_out";
                document.getElementById("merchant-modal").style.display = "none";
            }

            wave++;
            document.getElementById("wave-number").innerText = wave;
            
            let count = 3;
            if (wave === 2) count = 5; else if (wave === 3) count = 8;
            else if (wave >= 4) { count = 8; for (let i = 4; i <= wave; i++) count += (2 + i); }
            
            slimesToSpawn = count; spawnSlimes(slimesToSpawn);
            gameState = "playing";
        }

        document.getElementById("next-wave-btn").addEventListener("click", startNextWave);

        function damageSlime(s, amount, now, newlySpawnedSlimes) {
            if (now < s.vulnerableUntil) s.hp = 0; // Gammel logic for deling
            else s.hp -= amount; // Tar skade normalt (også mens den fuser!)
            
            if (s.hp <= 0 && !s.dead) {
                s.dead = true;
                if (s.stage > 1 && !s.isFusing) { // Deler seg bare hvis den IKKE er midt i en animasjon
                    let s1 = createSlime(s.x - 10, s.y, s.stage - 1);
                    let s2 = createSlime(s.x + 10, s.y, s.stage - 1);
                    s1.canFuseTime = now + 10000; s2.canFuseTime = now + 10000;
                    s1.vulnerableUntil = now + 300; s2.vulnerableUntil = now + 300;
                    newlySpawnedSlimes.push(s1, s2);
                }
            }
        }

        function update() {
            const now = Date.now();

            if ((keys["w"] || keys["arrowup"]) && player.y - player.size/2 > 0) player.y -= player.speed;
            if ((keys["s"] || keys["arrowdown"]) && player.y + player.size/2 < canvas.height) player.y += player.speed;
            if ((keys["a"]) && player.x - player.size/2 > 0) player.x -= player.speed;
            if ((keys["d"]) && player.x + player.size/2 < canvas.width) player.x += player.speed;

            if (merchant.active) {
                if (merchant.state === "walking_in") {
                    merchant.x += 2;
                    if (merchant.x >= canvas.width / 2) merchant.state = "waiting";
                } else if (merchant.state === "walking_out") {
                    merchant.x += 3;
                    if (merchant.x > canvas.width + 100) { merchant.active = false; merchant.state = "hidden"; }
                }
            }

            for (let i = clouds.length - 1; i >= 0; i--) {
                let c = clouds[i];
                if (now > c.endTime) { clouds.splice(i, 1); continue; }
                if (now - c.lastTick >= 150) {
                    c.lastTick = now;
                    for (let s of slimes) {
                        if (Math.hypot(s.x - c.x, s.y - c.y) < c.size) {
                            s.hp -= 0.5;
                            if (s.hp <= 0) s.dead = true; 
                        }
                    }
                }
            }

            if (gameState === "playing") {
                let newlySpawnedSlimes = []; 

                for (let i = bullets.length - 1; i >= 0; i--) {
                    bullets[i].x += bullets[i].dx; bullets[i].y += bullets[i].dy;
                    if (bullets[i].x < 0 || bullets[i].x > canvas.width || bullets[i].y < 0 || bullets[i].y > canvas.height) {
                        bullets.splice(i, 1);
                    }
                }

                for (let i = landmines.length - 1; i >= 0; i--) {
                    let m = landmines[i];
                    let triggered = false;
                    for (let s of slimes) {
                        if (!s.dead && Math.hypot(s.x - m.x, s.y - m.y) < s.size/2 + m.radius) { triggered = true; break; }
                    }
                    if (triggered) {
                        for (let s of slimes) {
                            if (!s.dead && Math.hypot(s.x - m.x, s.y - m.y) < 70) damageSlime(s, m.damage, now, newlySpawnedSlimes);
                        }
                        landmines.splice(i, 1);
                    }
                }

                for (let i = slimes.length - 1; i >= 0; i--) {
                    let s = slimes[i];
                    if (s.dead) continue;

                    // BEVEGELSE & ANIMASJON
                    if (s.isFusing) {
                        let progress = (now - s.fuseStartTime) / 2000; // 2 sekunder animasjon
                        if (progress >= 1) {
                            // Fullfør fusing
                            s.isFusing = false;
                            s.stage = s.targetStage;
                            let stats = getSlimeStats(s.stage);
                            s.hp = stats.maxHp; 
                            s.maxHp = stats.maxHp;
                            s.damage = stats.damage;
                            s.size = stats.size;
                            s.color = stats.color;
                            s.rgb = stats.rgb;
                            s.speed = stats.speed;
                        } else {
                            // Interpoler (blend) størrelse og farge mens den står stille
                            s.size = s.oldSize + (s.targetSize - s.oldSize) * progress;
                            let r = s.oldRgb.r + (s.targetRgb.r - s.oldRgb.r) * progress;
                            let g = s.oldRgb.g + (s.targetRgb.g - s.oldRgb.g) * progress;
                            let b = s.oldRgb.b + (s.targetRgb.b - s.oldRgb.b) * progress;
                            s.color = `rgb(${Math.floor(r)},${Math.floor(g)},${Math.floor(b)})`;
                        }
                    } else {
                        // Normal bevegelse
                        let angle = Math.atan2(player.y - s.y, player.x - s.x);
                        s.x += Math.cos(angle) * s.speed; s.y += Math.sin(angle) * s.speed;
                    }

                    // FYSISK KOLLISJON MELLOM SLIMES (De dytter hverandre)
                    for (let j = 0; j < slimes.length; j++) {
                        if (i !== j && !slimes[j].dead) {
                            let otherS = slimes[j];
                            let dist = Math.hypot(s.x - otherS.x, s.y - otherS.y);
                            let minDist = s.size/2 + otherS.size/2;
                            if (dist < minDist && dist > 0.1) {
                                let overlap = minDist - dist;
                                let pushAngle = Math.atan2(s.y - otherS.y, s.x - otherS.x);
                                // Dytt begge to hver sin vei
                                s.x += Math.cos(pushAngle) * (overlap / 2);
                                s.y += Math.sin(pushAngle) * (overlap / 2);
                                otherS.x -= Math.cos(pushAngle) * (overlap / 2);
                                otherS.y -= Math.sin(pushAngle) * (overlap / 2);
                            }
                        }
                    }

                    // Spiller kollisjon
                    let distToPlayer = Math.hypot(player.x - s.x, player.y - s.y);
                    if (distToPlayer < s.size/2 + player.size/2) {
                        if (now - player.lastHitTime >= player.iFrames) {
                            player.hp -= s.damage; player.lastHitTime = now;
                            document.getElementById("hp-text").innerText = player.hp;
                            document.getElementById("health-bar-fill").style.width = (player.hp / player.maxHp) * 100 + "%";
                            if (player.hp <= 0) location.reload(); 
                        }
                    }

                    // Kule kollisjon
                    for (let j = bullets.length - 1; j >= 0; j--) {
                        let b = bullets[j];
                        if (Math.hypot(b.x - s.x, b.y - s.y) < s.size/2 + b.size) {
                            bullets.splice(j, 1); 
                            damageSlime(s, b.damage, now, newlySpawnedSlimes);
                            if (s.dead) break; 
                        }
                    }

                    // FUSING LOGIKK (Start animasjon)
                    if (!s.dead && !s.isFusing && s.stage < 4 && now > s.canFuseTime) {
                        for (let k = i - 1; k >= 0; k--) { 
                            let otherS = slimes[k];
                            if (otherS.dead || otherS.isFusing || otherS.stage !== s.stage || now < otherS.canFuseTime) continue;

                            if (Math.hypot(otherS.x - s.x, otherS.y - s.y) < (s.size/2 + otherS.size/2)) { 
                                if (now - s.lastMergeCheck >= 250 && now - otherS.lastMergeCheck >= 250) {
                                    s.lastMergeCheck = now; otherS.lastMergeCheck = now;
                                    if (Math.random() < 0.50) { 
                                        // Spis den andre slimen, og start animasjonen for s
                                        otherS.dead = true; 
                                        
                                        s.isFusing = true;
                                        s.fuseStartTime = now;
                                        s.targetStage = s.stage + 1;
                                        s.oldSize = s.size;
                                        s.targetSize = 15 * Math.pow(1.5, s.targetStage - 1);
                                        s.oldRgb = s.rgb;
                                        s.targetRgb = stageColors[s.targetStage];
                                        break; 
                                    }
                                }
                            }
                        }
                    }
                }

                slimes = slimes.filter(s => !s.dead);
                slimes.push(...newlySpawnedSlimes);

                if (slimes.length === 0 && slimesToSpawn > 0) startWavePause();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const now = Date.now();

            ctx.fillStyle = "rgba(100, 150, 255, 0.3)";
            ctx.strokeStyle = "rgba(100, 150, 255, 0.8)";
            ctx.lineWidth = 2;
            clouds.forEach(c => {
                ctx.beginPath(); ctx.arc(c.x, c.y, c.size, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = "white";
                for(let i=0; i<3; i++) ctx.fillRect(c.x - c.size/2 + Math.random()*c.size, c.y - c.size/2 + Math.random()*c.size, 2, 6);
                ctx.fillStyle = "rgba(100, 150, 255, 0.3)"; 
            });

            landmines.forEach(m => {
                ctx.fillStyle = "#333";
                ctx.beginPath(); ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = (Math.floor(now / 300) % 2 === 0) ? "red" : "darkred";
                ctx.beginPath(); ctx.arc(m.x, m.y, m.radius / 2.5, 0, Math.PI * 2); ctx.fill();
            });

            if (merchant.active) {
                ctx.fillStyle = merchant.color;
                ctx.fillRect(merchant.x - merchant.width/2, merchant.y - merchant.height/2, merchant.width, merchant.height);
                ctx.fillStyle = "white";
                ctx.font = "20px Arial";
                ctx.fillText("M", merchant.x - 8, merchant.y + 7);
                
                if (merchant.state === "waiting" && !merchant.hasDrawn) {
                    ctx.fillStyle = "white"; ctx.font = "14px Arial";
                    ctx.fillText("[F] Shop", merchant.x - 25, merchant.y - 30);
                }
            }

            if (now - player.lastHitTime < player.iFrames) {
                if (Math.floor(now / 100) % 2 === 0) {
                    ctx.fillStyle = player.color;
                    ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
                }
            } else {
                ctx.fillStyle = player.color;
                ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
            }

            slimes.forEach(s => {
                ctx.fillStyle = (now < s.vulnerableUntil && Math.floor(now / 100) % 2 === 0) ? "white" : s.color;
                ctx.fillRect(s.x - s.size/2, s.y - s.size/2, s.size, s.size);
                
                // Tegn HP bar over slimen
                if (s.hp < s.maxHp && now > s.vulnerableUntil) {
                    ctx.fillStyle = "red"; ctx.fillRect(s.x - s.size/2, s.y - s.size/2 - 8, s.size, 4);
                    // Sikre at den ikke tegner HP bar under 0% hvis den dør av SMG
                    let hpPercent = Math.max(0, s.hp / s.maxHp); 
                    ctx.fillStyle = "green"; ctx.fillRect(s.x - s.size/2, s.y - s.size/2 - 8, s.size * hpPercent, 4);
                }
            });

            bullets.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); ctx.fill();
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        updateItemUI(); 
        gameLoop();
    </script>
</body>
</html>
