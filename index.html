<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Survival V8 - Gold & Mines</title>
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #222;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        canvas {
            display: block; margin: 0 auto; background-color: #111;
            border: 50px solid #444; box-sizing: border-box;
            height: 100vh; width: 100vw; max-width: 1000px; max-height: 800px;
        }

        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; align-items: center;
        }

        #item-hud-container {
            position: absolute; top: 5px; display: flex; align-items: center; gap: 15px;
            font-size: 24px; font-weight: bold; color: #aaa;
        }
        
        #item-box {
            width: 50px; height: 50px; border: 3px solid white;
            background: rgba(0,0,0,0.5); display: flex; justify-content: center;
            align-items: center; font-size: 10px; color: white; text-align: center;
        }

        #top-ui-container {
            margin-top: 60px; display: flex; flex-direction: column; align-items: center;
            gap: 5px; pointer-events: auto; background: rgba(0,0,0,0.8);
            padding: 10px 20px; border-radius: 10px; border: 2px solid #555;
        }

        #gold-display { font-size: 22px; color: gold; font-weight: bold; margin-bottom: 5px; }

        #health-bar-container {
            width: 200px; height: 15px; background-color: #444;
            border: 2px solid #fff; border-radius: 10px; overflow: hidden;
        }

        #health-bar-fill { height: 100%; width: 100%; background-color: #ff3333; transition: width 0.2s; }

        #wave-info {
            position: absolute; top: 60px; left: 20px; font-size: 24px;
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px;
        }

        #next-wave-btn {
            padding: 8px 15px; cursor: pointer; visibility: hidden; 
            background-color: #4CAF50; color: white; border: none; border-radius: 5px;
        }
        
        /* MERCHANT MODAL */
        #merchant-modal {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: rgba(30, 30, 35, 0.95);
            padding: 30px; border: 4px solid #8a789c; border-radius: 15px;
            pointer-events: auto; text-align: center; z-index: 100; min-width: 400px;
        }

        .quantity-control {
            display: flex; justify-content: center; align-items: center; gap: 20px; margin: 15px 0;
        }
        .q-btn {
            width: 40px; height: 40px; font-size: 24px; cursor: pointer;
            background: #555; color: white; border: none; border-radius: 5px;
        }

        #draw-btn {
            padding: 15px 30px; font-size: 18px; background: gold; color: black;
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        #cards-container {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px;
        }

        .card {
            width: 140px; height: 180px; background: #333; border: 3px solid #777;
            border-radius: 10px; position: relative; padding: 10px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .card-x {
            position: absolute; top: 5px; right: 5px; width: 25px; height: 25px;
            background: red; color: white; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; cursor: pointer; font-weight: bold;
        }

        #close-merchant {
            margin-top: 20px; padding: 10px 20px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="item-hud-container">
            <span>&lt;</span><div id="item-box">Tom</div><span>&gt;</span>
        </div>

        <div id="wave-info">Wave: <span id="wave-number">1</span></div>
        
        <div id="top-ui-container">
            <div id="gold-display">💰 <span id="gold-count">0</span></div>
            <div style="font-size: 14px;">HP: <span id="hp-text">15</span>/15</div>
            <div id="health-bar-container"><div id="health-bar-fill"></div></div>
            <button id="next-wave-btn">Neste Bølge (<span id="timer">5</span>)</button>
        </div>
        
        <div id="merchant-modal">
            <h2>The Merchant</h2>
            <p>Ett kort koster 150 gull (X gir 100 tilbake)</p>
            
            <div id="merchant-buy-controls">
                <div class="quantity-control">
                    <button class="q-btn" onclick="changeDrawQty(-1)">-</button>
                    <span id="draw-qty" style="font-size: 24px; width: 30px;">1</span>
                    <button class="q-btn" onclick="changeDrawQty(1)">+</button>
                </div>
                <button id="draw-btn">Trekk Kort (150g)</button>
            </div>

            <div id="cards-container"></div>
            <button id="close-merchant" style="display:none">Lukk Shop</button>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        function resizeCanvas() {
            canvas.width = canvas.clientWidth - 100;
            canvas.height = canvas.clientHeight - 100;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- SPILLER ---
        const player = {
            x: canvas.width / 2, y: canvas.height / 2,
            size: 20, speed: 2, color: "cyan",
            hp: 15, maxHp: 15, lastHitTime: 0, iFrames: 500, gold: 0,
            weaponLevels: { pistol: 1, shotgun: 0, smg: 0 },
            fireRateMult: 1.0 
        };

        const weaponCooldowns = {
            pistol: { lastShot: 0, baseDelay: 500 },
            shotgun: { lastShot: 0, baseDelay: 1000 },
            smg: { lastShot: 0, baseDelay: 100 }
        };

        const inventory = []; 
        let selectedItemIndex = 0;
        const bullets = [];
        const landmines = []; 
        const explosions = []; // For visuelle effekter
        let slimes = [];
        let clouds = []; 
        const keys = {};
        let drawQty = 1;
        
        // --- MERCHANT ---
        const merchant = {
            active: false, x: -100, y: canvas.height / 3 - 50, 
            width: 70, height: 40, color: "#8a789c", state: "hidden"
        };

        // --- INPUT ---
        window.addEventListener("keydown", (e) => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === "f" && merchant.state === "waiting") {
                let dist = Math.hypot(player.x - merchant.x, player.y - merchant.y);
                if (dist < 80) document.getElementById("merchant-modal").style.display = "block";
            }
            if (e.key.toLowerCase() === "c") useActiveItem();
            if (e.key === "ArrowLeft") cycleItem(-1);
            if (e.key === "ArrowRight") cycleItem(1);
            if (e.key.toLowerCase() === "e" && gameState === "playing") {
                const currentTime = Date.now();
                for (let wpn in player.weaponLevels) {
                    if (player.weaponLevels[wpn] > 0) {
                        let stats = weaponCooldowns[wpn];
                        if (currentTime - stats.lastShot >= stats.baseDelay * player.fireRateMult) {
                            shootWeapon(wpn, player.weaponLevels[wpn]);
                            stats.lastShot = currentTime;
                        }
                    }
                }
            }
        });
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        // --- KORT SYSTEM ---
        const rarities = { "Common": 35, "Rare": 25, "Epic": 20, "Mythic": 10, "Legendary": 8, "Exotic": 2 };
        const rarityColors = { "Common": "#aaa", "Rare": "#0af", "Epic": "#a0f", "Mythic": "#f05", "Legendary": "#fa0", "Exotic": "#0fc" };

        const cardsPool = [
            { id: "rapid_fire", name: "Rapid Fire", type: "upgrade", rarity: "Common", desc: "-15% Reload" },
            { id: "quick_draw", name: "Quick Draw", type: "upgrade", rarity: "Rare", desc: "-30% Reload" },
            { id: "shotgun", name: "Shotgun", type: "weapon", rarity: "Rare", desc: "Stacker prosjektiler!" },
            { id: "smg", name: "SMG", type: "weapon", rarity: "Epic", desc: "0.1s delay, 0.25 dmg." },
            { id: "landmine", name: "Landmine (x5)", type: "item", rarity: "Epic", desc: "AoE eksplosjon." },
            { id: "at_mine", name: "AT-Mine (x3)", type: "item", rarity: "Mythic", desc: "INSTA-KILL radius!" },
            { id: "bullet_rain", name: "Bullet Rain", type: "item", rarity: "Epic", desc: "2 sek regn." }
        ];

        function changeDrawQty(val) {
            drawQty = Math.max(1, drawQty + val);
            document.getElementById("draw-qty").innerText = drawQty;
            document.getElementById("draw-btn").innerText = `Trekk Kort (${drawQty * 150}g)`;
        }

        document.getElementById("draw-btn").addEventListener("click", () => {
            const cost = drawQty * 150;
            if (player.gold < cost) return alert("For lite gull!");
            
            player.gold -= cost;
            updateGoldUI();
            
            document.getElementById("merchant-buy-controls").style.display = "none";
            const container = document.getElementById("cards-container");
            container.innerHTML = "";

            for (let i = 0; i < drawQty; i++) {
                let card = rollCard();
                createCardUI(card);
            }
            document.getElementById("close-merchant").style.display = "inline-block";
        });

        function rollCard() {
            let roll = Math.random() * 100;
            let current = 0;
            let rarity = "Common";
            for (let r in rarities) {
                current += rarities[r];
                if (roll <= current) { rarity = r; break; }
            }
            let pool = cardsPool.filter(c => c.rarity === rarity);
            if (pool.length === 0) pool = cardsPool.filter(c => c.rarity === "Common");
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function createCardUI(card) {
            const div = document.createElement("div");
            div.className = "card";
            div.style.borderColor = rarityColors[card.rarity];
            div.innerHTML = `
                <div class="card-x">X</div>
                <b style="color:${rarityColors[card.rarity]}">${card.name}</b>
                <p style="font-size:11px">${card.desc}</p>
                <button class="claim-btn" style="margin-top:auto">Behold</button>
            `;

            div.querySelector(".card-x").onclick = (e) => {
                e.stopPropagation();
                player.gold += 100;
                updateGoldUI();
                div.remove();
                checkEmptyShop();
            };

            div.querySelector(".claim-btn").onclick = () => {
                applyCard(card);
                div.remove();
                checkEmptyShop();
            };

            document.getElementById("cards-container").appendChild(div);
        }

        function checkEmptyShop() {
            if (document.getElementById("cards-container").children.length === 0) {
                document.getElementById("merchant-buy-controls").style.display = "block";
            }
        }

        function applyCard(card) {
            if (card.type === "weapon") player.weaponLevels[card.id]++;
            if (card.id === "rapid_fire") player.fireRateMult *= 0.85;
            if (card.id === "quick_draw") player.fireRateMult *= 0.70;
            if (card.id === "landmine") giveItem("landmine", 5);
            if (card.id === "at_mine") giveItem("at_mine", 3);
            if (card.id === "bullet_rain") giveItem("bullet_rain", 1);
        }

        document.getElementById("close-merchant").addEventListener("click", () => {
            document.getElementById("merchant-modal").style.display = "none";
            document.getElementById("close-merchant").style.display = "none";
            document.getElementById("cards-container").innerHTML = "";
            document.getElementById("merchant-buy-controls").style.display = "block";
            drawQty = 1; changeDrawQty(0);
        });

        // --- KAMP LOGIKK ---
        function shootWeapon(type, level) {
            if (slimes.length === 0) return;
            let target = slimes[0]; // Enkel targetting for nå
            const baseAngle = Math.atan2(target.y - player.y, target.x - player.x);
            
            for (let i = 0; i < level; i++) {
                let offset = (i - (level-1)/2) * 0.1; // Små offsets for flere skudd
                if (type === "pistol") {
                    bullets.push({ x: player.x, y: player.y, dx: Math.cos(baseAngle + offset) * 10, dy: Math.sin(baseAngle + offset) * 10, size: 5, color: "yellow", damage: 1 });
                } else if (type === "shotgun") {
                    let spreads = [-0.3, -0.15, 0, 0.15, 0.3];
                    spreads.forEach(s => {
                        bullets.push({ x: player.x, y: player.y, dx: Math.cos(baseAngle + s + offset) * 9, dy: Math.sin(baseAngle + s + offset) * 9, size: 4, color: "orange", damage: 1 });
                    });
                } else if (type === "smg") {
                    bullets.push({ x: player.x, y: player.y, dx: Math.cos(baseAngle + offset) * 12, dy: Math.sin(baseAngle + offset) * 12, size: 3, color: "white", damage: 0.25 });
                }
            }
        }

        function createExplosion(x, y, radius) {
            explosions.push({ x, y, r: 0, maxR: radius, startTime: Date.now() });
        }

        // --- SLIME & WAVE ---
        const stageColors = { 1: {r: 0, g: 255, b: 0}, 2: {r: 255, g: 0, b: 0}, 3: {r: 128, g: 0, b: 128}, 4: {r: 255, g: 255, b: 0} };

        function getSlimeStats(stage) {
            let col = stageColors[stage];
            return { stage, hp: 1+stage, maxHp: 1+stage, damage: stage, size: 15 * Math.pow(1.5, stage-1), color: `rgb(${col.r},${col.g},${col.b})`, rgb: col, speed: 0.5 };
        }

        function updateGoldUI() { document.getElementById("gold-count").innerText = player.gold; }

        function damageSlime(s, amount, now, list) {
            s.hp -= amount;
            if (s.hp <= 0 && !s.dead) {
                s.dead = true;
                if (s.stage === 1) { player.gold += 10; updateGoldUI(); }
                if (s.stage > 1 && !s.isFusing) {
                    let s1 = { x: s.x-10, y: s.y, ...getSlimeStats(s.stage-1), canFuseTime: now+5000 };
                    let s2 = { x: s.x+10, y: s.y, ...getSlimeStats(s.stage-1), canFuseTime: now+5000 };
                    list.push(s1, s2);
                }
            }
        }

        function useActiveItem() {
            if (inventory.length === 0) return;
            let item = inventory[selectedItemIndex];
            if (item.id === "landmine") landmines.push({ x: player.x, y: player.y, radius: 20, damage: 8, type: "normal" });
            if (item.id === "at_mine") landmines.push({ x: player.x, y: player.y, radius: 30, damage: 999, type: "at" });
            if (item.id === "bullet_rain") {
                let now = Date.now();
                slimes.forEach(s => clouds.push({ x: s.x, y: s.y, endTime: now+2000, lastTick: now, size: 40 }));
            }
            item.count--;
            if (item.count <= 0) inventory.splice(selectedItemIndex, 1);
            updateItemUI();
        }

        function giveItem(id, count) {
            let exist = inventory.find(i => i.id === id);
            if (exist) exist.count += count; else inventory.push({ id, count });
            updateItemUI();
        }

        function updateItemUI() {
            const box = document.getElementById("item-box");
            if (inventory.length === 0) box.innerText = "Tom";
            else {
                let itm = inventory[selectedItemIndex];
                box.innerHTML = `${itm.id.toUpperCase()}<br>x${itm.count}`;
            }
        }

        function cycleItem(dir) {
            if (inventory.length === 0) return;
            selectedItemIndex = (selectedItemIndex + dir + inventory.length) % inventory.length;
            updateItemUI();
        }

        let wave = 1; let gameState = "playing"; let slimesToSpawn = 3;

        function spawnWave() {
            for (let i = 0; i < slimesToSpawn; i++) {
                slimes.push({ x: Math.random()*canvas.width, y: -50, ...getSlimeStats(1) });
            }
        }
        spawnWave();

        function startWavePause() {
            gameState = "waiting"; merchant.active = true; merchant.state = "walking_in"; merchant.x = -100;
            document.getElementById("next-wave-btn").style.visibility = "visible";
            let t = 5; let inter = setInterval(() => {
                t--; document.getElementById("timer").innerText = t;
                if (t <= 0) { clearInterval(inter); }
            }, 1000);
        }

        document.getElementById("next-wave-btn").onclick = () => {
            document.getElementById("next-wave-btn").style.visibility = "hidden";
            merchant.state = "walking_out";
            wave++; document.getElementById("wave-number").innerText = wave;
            slimesToSpawn = 3 + wave * 2; spawnWave();
            gameState = "playing";
        };

        // --- HOVEDLØKKE ---
        function update() {
            const now = Date.now();
            if (keys["w"]) player.y -= player.speed; if (keys["s"]) player.y += player.speed;
            if (keys["a"]) player.x -= player.speed; if (keys["d"]) player.x += player.speed;

            if (merchant.active) {
                if (merchant.state === "walking_in") { merchant.x += 2; if (merchant.x > canvas.width/2) merchant.state = "waiting"; }
                if (merchant.state === "walking_out") { merchant.x += 4; if (merchant.x > canvas.width+100) merchant.active = false; }
            }

            for (let i = explosions.length - 1; i >= 0; i--) {
                explosions[i].r += 5;
                if (now - explosions[i].startTime > 400) explosions.splice(i, 1);
            }

            if (gameState === "playing") {
                let nextSlimes = [];
                // Miner logic
                for (let i = landmines.length - 1; i >= 0; i--) {
                    let m = landmines[i];
                    let trig = slimes.some(s => Math.hypot(s.x - m.x, s.y - m.y) < s.size/2 + m.radius);
                    if (trig) {
                        let rad = m.type === "at" ? 100 : 70;
                        createExplosion(m.x, m.y, rad);
                        slimes.forEach(s => {
                            if (Math.hypot(s.x - m.x, s.y - m.y) < rad) damageSlime(s, m.damage, now, nextSlimes);
                        });
                        landmines.splice(i, 1);
                    }
                }

                bullets.forEach((b, i) => {
                    b.x += b.dx; b.y += b.dy;
                    slimes.forEach(s => {
                        if (!s.dead && Math.hypot(b.x-s.x, b.y-s.y) < s.size/2) {
                            damageSlime(s, b.damage, now, nextSlimes); bullets.splice(i, 1);
                        }
                    });
                });

                slimes.forEach(s => {
                    if (s.dead) return;
                    let angle = Math.atan2(player.y - s.y, player.x - s.x);
                    s.x += Math.cos(angle) * s.speed; s.y += Math.sin(angle) * s.speed;
                    if (Math.hypot(player.x-s.x, player.y-s.y) < s.size/2 + 10 && now-player.lastHitTime > 500) {
                        player.hp -= s.damage; player.lastHitTime = now;
                        document.getElementById("health-bar-fill").style.width = (player.hp/player.maxHp)*100 + "%";
                        if (player.hp <= 0) location.reload();
                    }
                });

                slimes = slimes.filter(s => !s.dead);
                slimes.push(...nextSlimes);
                if (slimes.length === 0) startWavePause();
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // Miner
            landmines.forEach(m => {
                ctx.fillStyle = m.type === "at" ? "black" : "#444";
                ctx.beginPath(); ctx.arc(m.x, m.y, m.radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(m.x, m.y, 5, 0, Math.PI*2); ctx.fill();
            });
            // Eksplosjoner
            explosions.forEach(e => {
                ctx.fillStyle = "rgba(255, 69, 0, 0.5)";
                ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = "red"; ctx.lineWidth = 3; ctx.stroke();
                // Flere små ringer inni
                ctx.beginPath(); ctx.arc(e.x, e.y, e.r*0.6, 0, Math.PI*2); ctx.stroke();
            });
            // Merchant
            if (merchant.active) {
                ctx.fillStyle = merchant.color; ctx.fillRect(merchant.x-35, merchant.y-20, 70, 40);
                ctx.fillStyle="white"; ctx.fillText("MERCHANT", merchant.x-30, merchant.y+5);
            }
            // Spiller
            ctx.fillStyle = player.color; ctx.fillRect(player.x-10, player.y-10, 20, 20);
            // Slimes
            slimes.forEach(s => { ctx.fillStyle = s.color; ctx.fillRect(s.x-s.size/2, s.y-s.size/2, s.size, s.size); });
            // Kuler
            bullets.forEach(b => { ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI*2); ctx.fill(); });
        }

        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
